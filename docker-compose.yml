version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: llm-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PUBLIC_URL=${PUBLIC_URL}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - LLAMA_CPP_URL=${LLAMA_CPP_URL}
      - DATABASE_PATH=data/database.sqlite
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_EXPIRY_HOURS=${SESSION_EXPIRY_HOURS}
      - SUPPRESS_CONSOLE=${SUPPRESS_CONSOLE}
    volumes:
      - ./backend/data:/app/data
      # Mount rocm-smi binary and libraries from host
      - /usr/bin/rocm-smi:/usr/bin/rocm-smi:ro
      - /opt/rocm/lib:/opt/rocm/lib:ro
      # Mount AMD GPU device nodes
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    privileged: true
    networks:
      - llm-network

  proxy:
    build:
      context: ./frontend
    container_name: llm-proxy
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_DEV_TEST_LOGIN=${VITE_DEV_TEST_LOGIN}
    depends_on:
      - backend
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
